{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>BookHouse | Catalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/book_style.css' %}">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1><i class="fa-solid fa-book-bookmark"></i> Book Catalog</h1>
            <a href="{% url 'create_book' %}" class="btn-add" style="text-decoration: none; background: #38bdf8; color: #0f172a; padding: 12px 24px; border-radius: 12px; font-weight: 800;">+ ADD BOOK</a>
        </div>

        <div class="author-grid">
            {% for book in books %}
            <div class="author-card" style="background: rgba(30, 41, 59, 0.4); border-radius: 24px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="height: 220px; border-radius: 15px; overflow: hidden; margin-bottom: 15px; background: #0f172a;">
                    {% if book.cover %}
                        <img src="{{ book.cover.url }}" style="width: 100%; height: 100%; object-fit: cover;">
                    {% else %}
                        <div style="height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem;">📘</div>
                    {% endif %}
                </div>
                <h3 style="font-size: 1.1rem; height: 40px; overflow: hidden;">{{ book.title }}</h3>
                <p style="color: #22c55e; font-weight: 800; margin-bottom: 10px;">{{ book.price }} TJS</p>
                
                <div style="text-align: left; font-size: 0.8rem; color: #94a3b8; margin-bottom: 15px;">
                    <p><i class="fa-solid fa-user-nib"></i> {{ book.author.full_name }}</p>
                    <p><i class="fa-solid fa-layer-group"></i> {{ book.category.name }}</p>
                </div>

                <div style="display: flex; gap: 8px;">
                    <a href="{% url 'book_detail' book.pk %}" style="flex: 1; background: rgba(56, 189, 248, 0.1); color: #38bdf8; text-decoration: none; padding: 8px; border-radius: 8px; text-align: center; font-size: 0.8rem;">Details</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
