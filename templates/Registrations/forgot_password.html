{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHouse | Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .reset-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .reset-card i.main-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .reset-card h1 {
            margin: 0 0 10px;
            font-size: 1.8rem;
        }

        .reset-card p {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i.input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-reset:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        .back-to-login {
            display: block;
            margin-top: 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-to-login:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="reset-card">
    <i class="fa-solid fa-shield-halved main-icon"></i>
    <h1>Reset Password</h1>
    <p>Enter your registered phone number to set a new password.</p>

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <i class="fa-solid fa-phone input-icon"></i>
            <input type="text" name="phone_number" placeholder="Phone Number" required>
        </div>

        <div class="form-group">
            <i class="fa-solid fa-lock-open input-icon"></i>
            <input type="password" name="new_password" placeholder="New Password" required>
        </div>

        <button type="submit" class="btn-reset">Update Password</button>
    </form>

    <a href="{% url 'login' %}" class="back-to-login">
        <i class="fa-solid fa-arrow-left"></i> Back to Login
    </a>
</div>

</body>
</html>
