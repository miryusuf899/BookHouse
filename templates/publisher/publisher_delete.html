{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Delete Publisher</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/publisher_style.css' %}">
</head>
<body>
    <form method="POST">
        {% csrf_token %}
        <h1 style="color: #ef4444;">Delete Company?</h1>
        <p style="text-align: center; margin-bottom: 25px;">
            Are you sure you want to delete <strong>{{ publisher.name }}</strong>?
        </p>
        
        <button type="submit" class="btn" style="background: #ef4444; color: white;">Confirm Delete</button>
        <a href="{% url 'publisher_list' %}" style="display: block; text-align: center; margin-top: 15px; color: #94a3b8; text-decoration: none;">Cancel</a>
    </form>
</body>
</html>
