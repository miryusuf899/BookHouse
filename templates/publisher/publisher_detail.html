{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ publisher.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/publisher_style.css' %}">
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 30px;">
            {% if publisher.logo %}
                <img src="{{ publisher.logo.url }}" style="max-width: 200px; border-radius: 12px; margin-bottom: 15px;">
            {% endif %}
            <h1>{{ publisher.name }}</h1>
        </div>
        
        <div class="info-card">
            <p style="color: #38bdf8; font-weight: bold;"><i class="fa-solid fa-location-dot"></i> Address:</p>
            <p style="margin-bottom: 15px;">{{ publisher.address }}</p>
            
            <p style="color: #38bdf8; font-weight: bold;"><i class="fa-solid fa-phone"></i> Phone:</p>
            <p>{{ publisher.phone }}</p>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <a href="{% url 'publisher_list' %}" class="btn" style="background: rgba(255,255,255,0.05); color: white; text-decoration: none; padding: 10px 20px; border-radius: 10px;">Back</a>
            <a href="{% url 'publisher_update' publisher.pk %}" class="btn" style="background: #38bdf8; color: #0f172a; text-decoration: none; padding: 10px 20px; border-radius: 10px; font-weight: bold;">Edit</a>
            <a href="{% url 'publisher_delete' publisher.pk %}" style="background: #ef4444; color: white; text-decoration: none; padding: 10px 20px; border-radius: 10px; margin-left: auto;">Delete</a>
        </div>
    </div>
</body>
</html>
