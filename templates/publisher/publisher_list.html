{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>BookHouse | Publishers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/author_style.css' %}">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1><i class="fa-solid fa-building"></i> Publishers</h1>
            <a href="{% url 'publisher_create' %}" class="btn-add" style="text-decoration: none; background: #38bdf8; color: #0f172a; padding: 10px 20px; border-radius: 10px; font-weight: bold;">+ New Publisher</a>
        </div>

        <div class="author-grid">
            {% for pub in publishers %}
            <div class="author-card" style="background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05);">
                <div class="logo-box" style="height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                    {% if pub.logo %}
                        <img src="{{ pub.logo.url }}" style="max-height: 100%; max-width: 100%; object-fit: contain;">
                    {% else %}
                        <div style="font-size: 2rem; color: #444;"><i class="fa-solid fa-industry"></i></div>
                    {% endif %}
                </div>
                <h3>{{ pub.name }}</h3>
                <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 15px;">{{ pub.phone }}</p>
                <div class="actions">
                    <a href="{% url 'publisher_detail' pub.pk %}" style="color: #38bdf8; text-decoration: none; margin-right: 10px;">Details</a>
                    <a href="{% url 'publisher_update' pub.pk %}" style="color: #f1f5f9; text-decoration: none;">Edit</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
