{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHouse | Categories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static '/css/category_list1.css' %}">
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-logo">📘 BookHouse</a>
        <div class="nav-links">
            <a href="{% url 'book_list' %}">Books</a>
            <a href="{% url 'author_list' %}">Authors</a>
            <a href="{% url 'category_list' %}" style="color: var(--accent-blue);">Categories</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1><i class="fa-solid fa-layer-group"></i> All Categories</h1>
            <a href="{% url 'category_create' %}" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> Add New Category
            </a>
        </div>

        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
        
        <div class="list-wrapper">
            {% for cat in categories %}
            <div class="card">
                <div class="card-content">
                    <h3>{{ cat.name }}</h3>
                    <p>{{ cat.description|truncatewords:20 }}</p>
                </div>
                
                <div class="card-actions">
                    <a href="{% url 'category_detail' cat.pk %}" class="btn btn-info" title="View">
                        <i class="fa-solid fa-eye"></i> View
                    </a>
                    <a href="{% url 'category_update' cat.pk %}" class="btn btn-primary" title="Edit">
                        <i class="fa-solid fa-pen-to-square"></i> Edit
                    </a>
                    <a href="{% url 'category_delete' cat.pk %}" class="btn btn-danger" title="Delete">
                        <i class="fa-solid fa-trash-can"></i> Delete
                    </a>
                </div>
            </div>
            {% empty %}
            <div class="empty-state">
                <i class="fa-solid fa-folder-open" style="font-size: 3rem; color: #334155;"></i>
                <p>No categories found.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
